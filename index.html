<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨</title>
  <style>
    :root{
      --bg1:#fbf4e9;
      --bg2:#efe2cf;
      --text:#2b2018;
      --muted:#6b5647;
      --accent:#b07a4a;
      --accent2:#7a4e2f;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1100px 650px at 20% 10%, rgba(176,122,74,.22) 0%, transparent 60%),
        radial-gradient(900px 600px at 80% 20%, rgba(122,78,47,.18) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .wrap{width:min(980px, 100%);}
    .card{
      background: rgba(255,255,255,.75);
      border:1px solid rgba(122,78,47,.18);
      border-radius:20px;
      padding:18px;
      box-shadow: 0 14px 50px rgba(43,32,24,.12);
      backdrop-filter: blur(10px);
    }

    .title{
      font-size: clamp(22px, 3.2vw, 34px);
      line-height:1.15;
      margin:0 0 10px;
      letter-spacing:.2px;
    }
    .subtle{
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      margin:0;
      white-space:pre-line;
    }
    .rulebox{
      border:1px solid rgba(122,78,47,.18);
      background: rgba(255,255,255,.55);
      border-radius:16px;
      padding:14px;
      margin-top:10px;
      white-space:pre-line;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button{
      appearance:none;
      border:1px solid rgba(122,78,47,.22);
      background: linear-gradient(135deg, rgba(176,122,74,.18), rgba(122,78,47,.10));
      color:var(--text);
      font-weight:800;
      padding:10px 14px;
      border-radius:14px;
      cursor:pointer;
    }
    button:hover{filter: brightness(1.02);}
    .ghost{background: rgba(255,255,255,.55);}

    .stepTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }
    .adim{
      font-weight:900;
      letter-spacing:.3px;
      font-size:18px;
      margin:0;
    }
    .progress{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      white-space:nowrap;
    }

    .qbox{
      margin-top:12px;
      border:1px solid rgba(122,78,47,.18);
      background: rgba(255,255,255,.55);
      border-radius:16px;
      padding:14px;
    }

    .label{
      font-weight:900;
      margin:0 0 6px;
      font-size:13px;
      letter-spacing:.2px;
    }
    .question{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      white-space:pre-line;
    }
    .inputRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      align-items:center;
    }
    input[type="text"]{
      flex:1 1 260px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(122,78,47,.22);
      background: rgba(255,255,255,.70);
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    .msg{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(122,78,47,.18);
      display:none;
      font-size:14px;
      white-space:pre-line;
      background: rgba(255,255,255,.68);
      color:var(--text);
    }
    .msg.ok{border-color: rgba(47,125,74,.22);}
    .msg.bad{border-color: rgba(181,71,71,.22);}

    .nextWrap{
      display:flex;
      justify-content:flex-end;
      margin-top:18px;
    }
    .nextWrap button{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
    }

    /* Adım 3 */
    .shukrWrap{
      display:flex;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .shukrLeft{flex: 1 1 320px; min-width:280px;}
    .shukrRight{
      flex: 1 1 320px; min-width:280px;
      display:flex; gap:10px; flex-wrap:wrap;
      justify-content:flex-start; align-content:flex-start;
    }
    .miniCard{
      width:min(240px, 100%);
      border:1px solid rgba(122,78,47,.18);
      background: rgba(255,255,255,.68);
      border-radius:16px;
      padding:12px;
    }
    .miniCard .t{margin:0; font-weight:800; font-size:14px; line-height:1.4;}
    .miniCard .s{margin:8px 0 0; color:var(--muted); font-size:12px;}

    /* Toast */
    .toast{
      position:fixed;
      left:50%;
      top:18px;
      transform:translateX(-50%);
      background: rgba(255,255,255,.85);
      border:1px solid rgba(122,78,47,.22);
      box-shadow: 0 10px 30px rgba(43,32,24,.14);
      border-radius:16px;
      padding:10px 12px;
      color:var(--text);
      font-weight:700;
      font-size:14px;
      white-space:pre-line;
      display:none;
      z-index:999999;
      max-width: min(520px, calc(100% - 40px));
    }

    /* Runaway button */
    .runaway{
      position:fixed;
      z-index:999998;
      left:50%;
      top:65%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin:center;
      pointer-events:auto;
    }

    .finalText{
      white-space:pre-line;
      color:var(--text);
      font-size:14px;
      line-height:1.65;
      margin:0;
    }
    .signature{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
  const FINAL_MESSAGE = `Ayşe,

iyi ki varsın.
İyi ki hem kardeşim hem de dostumsun.

Senin için dua ederken çoğu zaman Hz. Ali’nin duasıyla dua ediyorum:
“Rabbim gönlünde olanı hakkında hayırlı eylesin, hakkında hayırlı olanı da gönlüne razı eylesin.”🤲🏻

Senin için bütün güzellikleri, bütün mutlulukları dilerdim, ama biliyoruz ki bu dünya bir imtihan yeri.
Rabbim burada imtihanını da güzel eylesin,
ahirette ise en güzel meyvelerini tatmayı nasip etsin.

Hayatını hayırla doldursun,
ve sana O’nun rızasını kazanabileceğin bir ömür versin.

Seni seven kardeşin,
Ayşenur


Kalbin hep ferah olsun.`;

  const app = document.getElementById("app");
  const toast = document.getElementById("toast");

  function showToast(text){
    toast.textContent = text;
    toast.style.display = "block";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.style.display = "none", 1600);
  }

  function norm(s){
    return (s || "")
      .trim()
      .toLowerCase()
      .replaceAll("ı","i")
      .replaceAll("İ","i")
      .replaceAll("â","a")
      .replaceAll("ş","s")
      .replaceAll("ğ","g")
      .replaceAll("ü","u")
      .replaceAll("ö","o")
      .replaceAll("ç","c");
  }

  function escapeHtml(str){
    return (str || "").replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  let screen = "rules";
  let shukrEntries = [];

  function render(){
    if(screen === "rules") return renderRules();
    if(screen === "step1") return renderStep1();
    if(screen === "step2") return renderStep2();
    if(screen === "step3") return renderStep3();
    if(screen === "step4") return renderStep4();
    if(screen === "step5") return renderStep5();
    if(screen === "final") return renderFinal();
  }

  function topBar(adim, progress){
    return `
      <div class="stepTop">
        <div><p class="adim">${adim}</p></div>
        <div class="progress">${progress}</div>
      </div>
    `;
  }

  function removeRunaway(){
    const r = document.getElementById("runawayBtn");
    if(r) r.remove();
  }

  function renderRules(){
    removeRunaway();
    app.innerHTML = `
      <h1 class="title">Kurallar / Regeln</h1>
      <div class="rulebox subtle">Jede richtige Antwort öffnet das nächste Level. Du kannst Hint benutzen – aber dann meckere ich ein bisschen🤨

Not: Alles ist liebevoll gemeint. Falls du bei etwas kurz hängen bleibst: nefes al, gül, devam et😊</div>

      <div class="row">
        <button id="ok1">Tamam</button>
        <button id="ok2">Tamam</button>
      </div>
    `;
    document.getElementById("ok1").onclick = () => { screen="step1"; render(); };
    document.getElementById("ok2").onclick = () => { screen="step1"; render(); };
  }

  function renderStep1(){
    removeRunaway();
    const intro = `Aynı mahallede büyüdük.
Aynı sokaktan yürüdük.
Farklı kapılardan girdik… ama sabahları aynı yola çıktık.
Dostluk bazen aynı binada değil, aynı istikamette başlar.`;

    app.innerHTML = `
      ${topBar("Adım 1", "1/5")}
      <p class="subtle">${intro}</p>

      <div class="qbox">
        <p class="label">Soru / Frage</p>
        <p class="question">Biz her sabah nereye birlikte yürürdük?</p>

        <div class="inputRow">
          <input id="a1" type="text" placeholder="Cevabını yaz..." autocomplete="off"/>
          <button id="b1">Kontrol</button>
          <button id="h1" class="ghost">Hint 💡</button>
        </div>

        <div class="msg" id="hint1">Mars’a değil 😌</div>
        <div class="msg ok" id="m1ok">Ve yol, dostluğa dönüştü.</div>
        <div class="msg bad" id="m1bad">Hmm… olmadı. Bir daha dene 😄</div>

        <div class="nextWrap">
          <button id="next1" style="display:none;">Devam</button>
        </div>
      </div>
    `;

    const a1 = document.getElementById("a1");
    const ok = document.getElementById("m1ok");
    const bad = document.getElementById("m1bad");
    const hint = document.getElementById("hint1");
    const next = document.getElementById("next1");

    const allowed = ["okula","lise","ortaokul","okullar","okul"].map(norm);

    function check(){
      ok.style.display = "none";
      bad.style.display = "none";
      next.style.display = "none";
      const v = norm(a1.value);
      if(allowed.includes(v)){
        ok.style.display = "block";
        next.style.display = "inline-block";
      } else {
        bad.style.display = "block";
      }
    }

    document.getElementById("b1").onclick = check;
    document.getElementById("h1").onclick = () => hint.style.display = "block";
    a1.addEventListener("keydown", (e)=>{ if(e.key==="Enter") check(); });
    next.onclick = () => { screen="step2"; render(); };
    a1.focus();
  }

  function renderStep2(){
    removeRunaway();
    const intro = `Tatillerde, hafta sonlarında bir araya gelir, aynı satırların başına otururduk.
Bazen ciddiydik, bazen gülerdik.
Risale-i Nur içimizde küçük bir merak uyandırıyordu.`;

    app.innerHTML = `
      ${topBar("Adım 2", "2/5")}
      <p class="subtle">${intro}</p>

      <div class="qbox">
        <p class="label">Soru / Frage</p>
        <p class="question">O yaşta bizi derslere çeken duygu neydi?</p>

        <div class="inputRow">
          <input id="a2" type="text" placeholder="İçinden geleni yaz..." autocomplete="off"/>
          <button id="b2">Kontrol</button>
          <button id="h2" class="ghost">Hint 💡</button>
        </div>

        <div class="msg" id="hint2">Cevap Google’da yok 😌</div>
        <div class="msg ok" id="m2ok">Belki meraktı.
Belki huzurdu.
Belki sadece birlikte olmaktı.
Ama o günler, dostluğumuzu derinleştirdi.</div>

        <div class="nextWrap">
          <button id="next2" style="display:none;">Devam</button>
        </div>
      </div>
    `;

    const a2 = document.getElementById("a2");
    const ok = document.getElementById("m2ok");
    const hint = document.getElementById("hint2");
    const next = document.getElementById("next2");

    function go(){
      ok.style.display = "block";
      next.style.display = "inline-block";
    }

    document.getElementById("b2").onclick = go;
    document.getElementById("h2").onclick = () => hint.style.display = "block";
    a2.addEventListener("keydown", (e)=>{ if(e.key==="Enter") go(); });
    next.onclick = () => { screen="step3"; render(); };
    a2.focus();
  }

  function renderStep3(){
    removeRunaway();
    const intro = `Hayat hep aynı çizgide ilerlemedi.
Bazen dersten uzaklaştım.
Ama sen hep yanımda kaldın.
Dinledin, cesaret verdin, tekrar dönmem için elimi tuttun.
Bunun için çok şükür.`;

    app.innerHTML = `
      ${topBar("Adım 3", "3/5")}
      <p class="subtle">${intro}</p>

      <div class="qbox">
        <p class="label">Mini görev</p>
        <p class="question">Şimdi şükür ettiğin şeyleri yazalım.
Aklına gelen ilk şeyi yaz — büyük/küçük fark etmez.</p>

        <div class="shukrWrap">
          <div class="shukrLeft">
            <div class="inputRow">
              <input id="a3" type="text" placeholder="Şükür ettiğin bir şeyi yaz..." autocomplete="off"/>
              <button id="b3">Ekle</button>
            </div>
            <div class="msg ok" id="m3ok" style="display:none;"></div>
          </div>
          <div class="shukrRight" id="cards"></div>
        </div>

        <div class="nextWrap">
          <button id="next3" style="display:none;">Devam</button>
        </div>
      </div>
    `;

    const a3 = document.getElementById("a3");
    const m3 = document.getElementById("m3ok");
    const cards = document.getElementById("cards");
    const next = document.getElementById("next3");

    function repaint(){
      cards.innerHTML = shukrEntries.map(t => `
        <div class="miniCard">
          <p class="t">${escapeHtml(t)}</p>
          <p class="s">Elhamdülillah 🤎</p>
        </div>
      `).join("");
    }

    function addEntry(){
      const raw = (a3.value || "").trim();
      if(!raw) return;
      shukrEntries.push(raw);
      a3.value = "";
      repaint();

      m3.style.display = "block";
      if(shukrEntries.length === 1) m3.textContent = "Bir şükür daha…";
      else if(shukrEntries.length === 2) m3.textContent = "Son bir tane daha…";
      else {
        m3.textContent = "Şükür paylaştıkça çoğalır.";
        next.style.display = "inline-block";
      }
    }

    document.getElementById("b3").onclick = addEntry;
    a3.addEventListener("keydown", (e)=>{ if(e.key==="Enter") addEntry(); });
    next.onclick = () => { screen="step4"; render(); };

    repaint();
    a3.focus();
  }

  function renderStep4(){
    removeRunaway();
    const intro = `Şimdi biraz zorlayacağım.
Zekânı da kullanman gerekecek 😌
Bakalım o satırlar hâlâ aklında mı…`;

    app.innerHTML = `
      ${topBar("Adım 4", "4/5")}
      <p class="subtle">${intro}</p>

      <div class="qbox">
        <p class="label">Rätsel</p>
        <p class="question">“Ben” küçülür,
“Biz” büyür.
Gösterişi sevmez.
Sessizdir ama güçlüdür.

Nedir?</p>

        <div class="inputRow">
          <input id="a4" type="text" placeholder="Cevabın..." autocomplete="off"/>
          <button id="b4">Kontrol</button>
          <button id="h4" class="ghost">Hint 💡</button>
        </div>

        <div class="msg" id="hint4">Ego değil.</div>
        <div class="msg ok" id="m4ok">Tamam, hâlâ hatırlıyorsun 😄
Fena değilsin.</div>
        <div class="msg bad" id="m4bad">Hmm… bir daha dene 😄</div>

        <div class="nextWrap">
          <button id="next4" style="display:none;">Devam</button>
        </div>
      </div>
    `;

    const a4 = document.getElementById("a4");
    const ok = document.getElementById("m4ok");
    const bad = document.getElementById("m4bad");
    const hint = document.getElementById("hint4");
    const next = document.getElementById("next4");

    const answers = ["ihlas","ihlâs"].map(norm);

    function check(){
      ok.style.display = "none";
      bad.style.display = "none";
      next.style.display = "none";
      const v = norm(a4.value);
      if(answers.includes(v)){
        ok.style.display = "block";
        next.style.display = "inline-block";
      } else {
        bad.style.display = "block";
      }
    }

    document.getElementById("b4").onclick = check;
    document.getElementById("h4").onclick = () => hint.style.display = "block";
    a4.addEventListener("keydown", (e)=>{ if(e.key==="Enter") check(); });
    next.onclick = () => { screen="step5"; render(); };
    a4.focus();
  }

  function renderStep5(){
  // Kasten + Buttons ganz normal rendern (Devam erstmal "unschuldig" im Kasten)
  app.innerHTML = `
    ${topBar("Adım 5", "5/5")}
    <p class="subtle">Son bir şey daha var.

Gerçekten devam etmek istiyor musun?</p>

    <div class="qbox">
      <div class="row" style="margin-top:10px;">
        <button class="ghost" id="hayir5">❌ Hayır, yeter artık</button>
        <button id="runawayBtn">✅ Devam edelim</button>
      </div>
      <div class="msg" id="step5msg" style="display:none;"></div>
    </div>
  `;

  const hayir = document.getElementById("hayir5");
  const btnRun = document.getElementById("runawayBtn");
  const msg = document.getElementById("step5msg");

  let fleeCount = 0;
  let devScale = 1;
  let isActivated = false;

  function activateRunaway(){
    if(isActivated) return;
    isActivated = true;

    // Button "befreien": fixed + über den ganzen Screen
    btnRun.classList.add("runaway");

    // Beim Aktivieren direkt an eine sinnvolle Startposition setzen
    btnRun.style.left = "50%";
    btnRun.style.top = "65%";
    btnRun.style.transform = "translate(-50%, -50%) scale(1)";
  }

  function placeRandom(){
    const pad = 16;

    // transform kurz neutralisieren, um korrekte Breite/Höhe zu bekommen
    btnRun.style.transform = "translate(0,0) scale(1)";
    const rect = btnRun.getBoundingClientRect();

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const maxX = Math.max(pad, vw - rect.width - pad);
    const maxY = Math.max(pad, vh - rect.height - pad);

    const x = Math.floor(pad + Math.random() * (maxX - pad));
    const y = Math.floor(pad + Math.random() * (maxY - pad));

    btnRun.style.left = x + "px";
    btnRun.style.top = y + "px";
    btnRun.style.transform = `translate(0,0) scale(${devScale})`;
  }

  function finish(){
    hayir.style.display = "none";
    msg.style.display = "block";
    msg.textContent = "Tamam tamam… artık kaçmıyorum 😄";

    // Devam bleibt schön klickbar in der Mitte
    btnRun.style.left = "50%";
    btnRun.style.top = "65%";
    btnRun.style.transform = `translate(-50%, -50%) scale(${Math.min(devScale, 2.0)})`;
  }

  function flee(){
    // Beim ersten "Weglaufen" aktivieren wir erst das Runaway-Verhalten
    if(!isActivated){
      activateRunaway();
    }

    if(fleeCount >= 5) return;
    fleeCount++;

    devScale = Math.min(1.0 + fleeCount * 0.18, 2.1);
    placeRandom();

    if(fleeCount >= 5){
      finish();
    }
  }

  // Hover: weg laufen (Desktop)
  btnRun.addEventListener("mouseenter", () => {
    if(fleeCount < 5) flee();
  });

  // Touch: weg laufen (Handy)
  btnRun.addEventListener("touchstart", (e) => {
    if(fleeCount < 5){
      e.preventDefault();
      flee();
    }
  }, {passive:false});

  // Hayır klick → Toast
  hayir.onclick = () => showToast("Yanlış kapı 😌\nLütfen biraz daha çabala.");

  // Devam klick → nur nach 5 Fluchten geht es ins Finale
  btnRun.onclick = () => {
    if(fleeCount < 5){
      showToast("Olmadı 😄 biraz daha…");
      flee();
      return;
    }
    // Finale
    const r = document.getElementById("runawayBtn");
    if(r) r.remove();
    screen = "final";
    render();
  };
}
